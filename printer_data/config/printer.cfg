[include mainsail.cfg]

# host MCU service is preinstalled and ready to use with:
[mcu CB1]
serial: /tmp/klipper_host_mcu


[include Orbitool_O2S.cfg]
[include macros.cfg]
[include Orbiter2_SmartSensor.cfg]
[include print_area_bed_mesh.cfg]

[virtual_sdcard]
path: /home/biqu/printer_data/gcodes

[pause_resume]

[display_status]

# Enable object exclusion

[exclude_object]

# Enable arcs support
[gcode_arcs]
resolution: 0.1

# This file contains common pin mappings for the BIGTREETECH Manta M8P
# To use this config, the firmware should be compiled for the
# STM32G0B1 with a "8KiB bootloader" and USB communication.

# See docs/Config_Reference.md for a description of parameters.

[mcu]
##	[X in MOTOR4] - B Motor
##	[Y in MOTOR5] - A Motor
##	[E in MOTOR6] - Extruder
##	Obtain definition by "ls -l /dev/serial/by-id/" then unplug to verify
##--------------------------------------------------------------------
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_2C0033000C504B4633373520-if00
#restart_method: command
##--------------------------------------------------------------------

[printer]
kinematics: corexy
max_velocity: 500  
max_accel: 6400    			#Max 4000
max_z_velocity: 20 			#Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 1000
square_corner_velocity: 5.0

[temperature_sensor MCU]
sensor_type: temperature_mcu

[temperature_sensor SoC]
sensor_type: temperature_host

#####################################################################
# 	X/Y Stepper Settings
#####################################################################

## X Stepper on Motor4(B Motor)
##	[X in MOTOR4] - B Motor
[stepper_x]
step_pin: PD3
dir_pin: PD2
enable_pin: !PD5
# 16T Pulley / 0.9 stepper motor
microsteps: 64
rotation_distance: 32
full_steps_per_rotation: 400

endstop_pin: ^PC0
position_min: 0
#homing_dir: 1
position_endstop: 290
position_max: 290
homing_speed: 25   #Max 100
homing_retract_dist: 5
#homing_positive_dir: true

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_x]
uart_pin: PD4
interpolate: True
run_current: 1.4
hold_current: 0.7
sense_resistor: 0.110
#stealthchop_threshold: 0

##	[Y in MOTOR5] - A Motor
## Y Stepper on Motor2 (A Motor)
[stepper_y]
step_pin: PC9
dir_pin: !PC8
enable_pin: !PD1
# 16T Pulley / 0.9 stepper motor
microsteps: 64
rotation_distance: 32
full_steps_per_rotation: 400
#endstop_pin: ^PC0
position_min: 0

position_endstop: 0
position_max: 295

homing_speed: 25  #Max 100
homing_retract_dist: 5
#homing_positive_dir: true

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_y]
uart_pin: PD0
interpolate: True
run_current: 1.4
hold_current: 0.7
sense_resistor: 0.110
#stealthchop_threshold: 0

#####################################################################
# 	Z Stepper Settings
#####################################################################

## Z0 Stepper - Center Right on MOTOR3_A
[stepper_z]
step_pin: PD7
dir_pin: !PD6
enable_pin: !PF10
rotation_distance: 4
microsteps: 64
#endstop_pin: ^PF5
##  Z-position of nozzle (in mm) to z-endstop trigger point relative to print surface (Z0)
##  (+) value = endstop above Z0, (-) value = endstop below
##	Increasing position_endstop brings nozzle closer to the bed
##  After you run Z_ENDSTOP_CALIBRATE, position_endstop will be stored at the very end of your config
#position_endstop: -0.5
endstop_pin: probe:z_virtual_endstop
position_max: 275
position_min: -5
homing_speed: 5
second_homing_speed: 3
homing_retract_dist: 3

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z]
uart_pin: PF9
interpolate: true
run_current: 0.5
hold_current: 0.5
sense_resistor: 0.110
#stealthchop_threshold: 0

##	Z1 Stepper - Rear Front on Motor2  -------------------------
[stepper_z1]
step_pin: PF12
dir_pin: !PF11
enable_pin: !PB3
rotation_distance: 4
microsteps: 64

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z1]
uart_pin: PF13
interpolate: true
run_current: 0.5
hold_current: 0.5
sense_resistor: 0.110
#stealthchop_threshold: 0

##	Z2 Stepper - Left Rear on Motor1  ------------------------
[stepper_z2]
step_pin: PE2
dir_pin: !PB4
enable_pin: !PC11
rotation_distance: 4
microsteps: 64

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z2]
uart_pin: PC10
interpolate: true
run_current: 0.5
hold_current: 0.5
sense_resistor: 0.110
#stealthchop_threshold: 0

#####################################################################
# 	Bed Heater
#####################################################################

[heater_bed]
##	SSR Pin - BED_OUT
heater_pin: PB7
sensor_type: ATC Semitec 104GT-2
sensor_pin: PA0
##	Adjust Max Power so your heater doesn't warp your bed
max_power: 0.6
min_temp: 0
max_temp: 120
#control: pid

#####################################################################
# 	BLtouch
#####################################################################

[bltouch]
sensor_pin: PB2
control_pin: PB1

x_offset: 2
y_offset: 42.0
#z_offset: 2.7 #5.5
speed: 10
samples: 3
samples_result: median
sample_retract_dist: 3.0
samples_tolerance: 0.006
samples_tolerance_retries: 3

#####################################################################
# 	Fan Control
#####################################################################

[fan_generic chamber_fan]
##	Print Cooling Fan - FAN2
pin: PE0
#enable_pin: PE1
kick_start_time: 0.5
##	Depending on your fan, you may need to increase this value
##	if your fan will not start. Can change cycle_time (increase)
##	if your fan is not able to slow down effectively
max_power: 1.0
off_below: 0.05
#tachometer_pin: PC13

#[heater_fan hotend_fan]
##	Hotend Fan - CNC_FAN1
#pin: PE0
#max_power: 1.0
#kick_start_time: 0.5
#heater: extruder
#heater_temp: 50.0
##	If you are experiencing back flow, you can reduce fan_speed
#fan_speed: 1.0

#[heater_fan controller_fan]
##	Controller fan - CNC_FAN2
#pin: PC12
#kick_start_time: 0.5
#heater: heater_bed
#heater_temp: 45.0

#[heater_fan exhaust_fan]
##	Exhaust fan - CNC_FAN3
#pin: PE5                      #PE5 output is FRIED - OOPS
#max_power: 1.0
#shutdown_speed: 0.0
#kick_start_time: 5.0
#heater: heater_bed
#heater_temp: 60
#fan_speed: 1.0

#[heater_fan fan4]
#pin: PE4
#tachometer_pin: PC13

#[heater_fan fan5]
#pin: PB8
#tachometer_pin: PC14

#[heater_fan fan6]
#pin: PB9
#tachometer_pin: PC15

[fan_generic Case]
pin: PC12
max_power: 1.0
shutdown_speed: 0
#cycle_time:
#hardware_pwm:
kick_start_time: .5
off_below: 0.05


#================================= Delayed G-Code on startup ====================
[delayed_gcode turnOnFan]
initial_duration: 1
gcode:
    SET_FAN_SPEED FAN=Case SPEED=.5



#####################################################################
# 	LED Control
#####################################################################

#[output_pin caselight]
# Chamber Lighting - HE1 Connector (Optional)
#pin: PB5
#pwm:true
#shutdown_value: 0
#value:1
#cycle_time: 0.01

#####################################################################
# 	Homing and Gantry Adjustment Routines
#####################################################################

[idle_timeout]
timeout: 1800

[safe_z_home]
##	XY Location of the Z Endstop Switch
##	Update -10,-10 to the XY coordinates of your endstop pin 
##	(such as 157,305) after going through Z Endstop Pin
##	Location Definition step.
home_xy_position:150,110
speed:200
z_hop:10
z_hop_speed:10

# [bed_mesh] section (Optional, for leveling)
[bed_mesh]
speed: 200
horizontal_move_z: 5
mesh_min: 45, 45    # Adjust for your nozzle position
mesh_max: 260, 260  # Adjust for your nozzle position
probe_count: 5, 5

[z_tilt]                    # Tram the bed - correct bed tilt
horizontal_move_z: 5

z_positions:                # Position of bed pivot points
     340, 105                # Measure at bed retaining bolts
    -20, 20
    -20, 280
points:                     # Probe Point locations
     290, 105
     5, 0
     5, 235

retries: 4
retry_tolerance: 0.02
speed: 400


[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PE9, EXP1_2=PE10,
    EXP1_3=PE11, EXP1_4=PE12,
    EXP1_5=PE13, EXP1_6=PE14,    # Slot in the socket on this side
    EXP1_7=PE15, EXP1_8=PB10,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PB14, EXP2_2=PB13,
    EXP2_3=PF7, EXP2_4=PB12,
    EXP2_5=PE7, EXP2_6=PB11,      # Slot in the socket on this side
    EXP2_7=PE8, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=PC5

# See the sample-lcd.cfg file for definitions of common LCD displays.



[resonance_tester]
accel_chip: adxl345
probe_points:
    155, 155, 20  # an example

[input_shaper]
shaper_freq_x: 51.8
shaper_type_x: mzv
shaper_freq_y: 74.4
shaper_type_y: mzv

[printer]
max_accel: 3000  # should not exceed the estimated max_accel for X and Y axes

[skew_correction]



#####################################################################
# 	Macros
#####################################################################

[gcode_macro G32]
gcode:
    BED_MESH_CLEAR
    G28
    Z_TILT
    G28
    G0 X150 Y150 Z30 F3600
    
   
[gcode_macro PRINT_START]
#   Use PRINT_START for the slicer starting script - please customise for your slicer of choice
gcode:
    G32                            ; home all axes
    G1 Z20 F3000                   ; move nozzle away from bed
   

[gcode_macro PRINT_END]
#   Use PRINT_END for the slicer ending script - please customise for your slicer of choice
gcode:
    M400                           ; wait for buffer to clear
    G92 E0                         ; zero the extruder
    G1 E-10.0 F3600                ; retract filament
    G91                            ; relative positioning
    G0 Z1.00 X20.0 Y20.0 F20000    ; move nozzle to remove stringing
    TURN_OFF_HEATERS
    M107                           ; turn off fan
    G1 Z10 F3000                    ; move nozzle up 2mm
    G90                            ; absolute positioning
    G0  X275 Y275 F3600            ; park nozzle at rear
    BED_MESH_CLEAR

[gcode_macro M106]
description: Custom fan control function to allow slicers assuming bambu lab specific aux fan control to define an auxilary part cooling fan speed
rename_existing: M106.1
gcode:
    ## Define the mapping between the bambu lab fans and the fan_generic fans defined
    ## Source: https://forum.bambulab.com/t/bambu-lab-x1-specific-g-code/666
    ## NOTE: ensure P0 is left as "fan". This is important as you cannot set the
    ## standard part cooling fan Using the set_fan_speed command.
    ## This is accounted for in the macro and handled appropriately.
    {% set fan_map = ({
    "P0": "fan",
    "P1": "aux_fan",
    "P2": "chamber_fan",
    })
    %}
    
    ## Divide the params given into an array split on a singular whitespace
    {% set split_params = rawparams.split(" ") %}
    
    ## If we've had more than one paramater passed define requested fan and speed
    ## if one paramater is passed, assume were asking for the part cooling fan
    {% if split_params|length == 1 %}
    {% set requested_fan = "P0" %}
    {% set fan_speed = rawparams %}
    {% else %}
    {% set requested_fan, fan_speed = split_params %}
    {% endif %}
    
    ## check to ensure the requested fan is mapped
    ## this allows us to safely ignore commands for fans were not using
    {% if requested_fan in fan_map %}
    
    ## define the target fan device as per the above map
    {% set target_fan = fan_map[requested_fan] %}
    
    # If the target fan is the part cooling fan, just use the standard M106.
    {% if target_fan == "fan" %}
    M106.1 {fan_speed}
    {% else %}
    
    ## strip the leading S from the fan speed
    {% if fan_speed[0:1] == "S" %}
    {% set fan_speed = fan_speed[1:-1] %}
    {% endif %}
    
    # Convert the 0-255 fan percentage to a percentage between 0 and 1
    {% set fan_percentage = (fan_speed|int / 255 * 10)|round(1) %}
    
    # Set the requested fan speed on the target fan
    SET_FAN_SPEED fan={target_fan} speed={fan_percentage}
    {% endif %}
    {% endif %}
    

    
## 	Thermistor Types
##   "EPCOS 100K B57560G104F"
##   "ATC Semitec 104GT-2"
##   "NTC 100K beta 3950"
##   "Honeywell 100K 135-104LAG-J01"
##   "NTC 100K MGB18-104F39050L32" (Keenovo Heater Pad)
##   "AD595"
##   "PT100 INA826"

